<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | EMERGENCY PROTOCOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #050505;
            --accent: #00ff88;
            --urgent: #ff0000;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; transition: background-color 0.2s; }

        /* Emergency Flash Effect */
        body.emergency-active { animation: emergencyFlash 0.5s infinite; }
        @keyframes emergencyFlash {
            0% { background-color: #050505; }
            50% { background-color: #330000; }
            100% { background-color: #050505; }
        }

        #cursor {
            width: 15px; height: 15px; background: var(--accent); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; transition: transform 0.1s;
        }

        nav {
            padding: 25px 50px; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%; z-index: 1000;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; text-transform: uppercase; }

        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { font-size: clamp(3rem, 12vw, 9rem); font-weight: 900; letter-spacing: -8px; line-height: 0.8; }

        .section { padding: 40px 10%; }
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        
        .card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 35px; border-radius: 12px; position: relative;
            transition: 0.3s; 
        }
        .card.urgent-card { 
            border: 2px solid var(--urgent); 
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Admin Dashboard */
        #adminPanel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 11000; display: none; padding: 60px 10%;
        }
        .input-group { background: #0a0a0a; padding: 30px; border-radius: 15px; border: 1px solid var(--border); }
        input, textarea, select { width: 100%; padding: 18px; background: #000; border: 1px solid #222; color: #fff; margin-bottom: 20px; outline: none; }
        .btn { padding: 20px 40px; border: none; font-weight: 900; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .btn-add { background: var(--accent); color: #000; width: 100%; }
        .btn-close { background: #333; color: #fff; margin-bottom: 20px; }

        /* Status Indicator */
        #status-box { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; font-weight: 900; }
        .pulse-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: p-glow 1s infinite; }
        @keyframes p-glow { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <nav>
        <div class="logo" id="secretTrigger">SECURE.COMMAND</div>
        <div id="status-box">
            <div class="pulse-dot" id="statusDot"></div>
            <span id="statusTxt">[ SYSTEM STANDBY ]</span>
        </div>
    </nav>

    <div id="adminPanel">
        <button class="btn btn-close" onclick="closeAdmin()">ABORT SESSION</button>
        <div class="input-group">
            <input type="text" id="postTitle" placeholder="ALERT CODE">
            <select id="postCat">
                <option value="normal">STANDARD UPDATE</option>
                <option value="urgent">CRITICAL URGENT (SIREN ACTIVE)</option>
            </select>
            <textarea id="postMsg" rows="5" placeholder="EMERGENCY DATA..."></textarea>
            <button class="btn btn-add" onclick="addPost()">INITIALIZE TRANSMISSION</button>
        </div>
    </div>

    <main id="mainUI">
        <section class="hero">
            <div id="glitch-text" style="color: var(--accent); font-weight: 900; letter-spacing: 15px; font-size: 0.7rem; margin-bottom: 25px;">LEVEL 4 ENCRYPTION</div>
            <h1 class="hero-title">COMMAND<br>FEED</h1>
        </section>

        <section class="section">
            <div class="feed-grid" id="feed"></div>
        </section>
    </main>

    <script>
        // --- ADVANCED AUDIO & SIREN ENGINE ---
        let audioCtx, masterGain, droneOsc;
        let isSystemOn = false;

        function initSystem() {
            if (isSystemOn) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            
            // Tension Background Drone
            droneOsc = audioCtx.createOscillator();
            droneOsc.type = 'sawtooth';
            droneOsc.frequency.setValueAtTime(50, audioCtx.currentTime); 
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(120, audioCtx.currentTime);
            
            droneOsc.connect(filter);
            filter.connect(masterGain);
            masterGain.connect(audioCtx.destination);
            droneOsc.start();

            isSystemOn = true;
            document.getElementById('statusTxt').innerText = "[ BROADCAST ACTIVE ]";
            document.getElementById('statusDot').style.background = "var(--accent)";
        }

        function playEmergencySiren() {
            if(!audioCtx) return;
            
            // SIREN OSCILLATOR
            const sirenOsc = audioCtx.createOscillator();
            const sirenGain = audioCtx.createGain();
            
            sirenOsc.type = 'square'; // Suara tajam militer
            const now = audioCtx.currentTime;

            // Suara Sirine Naik Turun (Wooo-Wooo-Wooo)
            sirenOsc.frequency.setValueAtTime(300, now);
            for(let i = 0; i < 5; i++) {
                sirenOsc.frequency.exponentialRampToValueAtTime(800, now + (i * 1) + 0.5);
                sirenOsc.frequency.exponentialRampToValueAtTime(300, now + (i * 1) + 1);
            }

            sirenGain.gain.setValueAtTime(0.3, now); // VOLUME KERAS
            sirenGain.gain.exponentialRampToValueAtTime(0.01, now + 5.5);

            sirenOsc.connect(sirenGain);
            sirenGain.connect(audioCtx.destination);
            sirenOsc.start();
            sirenOsc.stop(now + 6);

            // Visual Alert
            document.body.classList.add('emergency-active');
            document.getElementById('statusTxt').innerText = "[ WARNING: CRITICAL ALERT ]";
            document.getElementById('statusTxt').style.color = "var(--urgent)";
            document.getElementById('statusDot').style.background = "var(--urgent)";
            
            setTimeout(() => {
                document.body.classList.remove('emergency-active');
                document.getElementById('statusTxt').innerText = "[ BROADCAST ACTIVE ]";
                document.getElementById('statusTxt').style.color = "var(--text)";
                document.getElementById('statusDot').style.background = "var(--accent)";
            }, 5500);
        }

        function playNormalBeep() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        window.addEventListener('mousedown', initSystem);

        // --- UI LOGIC ---
        const cursor = document.getElementById('cursor');
        let mX = 0, mY = 0, cX = 0, cY = 0;
        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });
        function move() {
            cX += (mX - cX) * 0.15; cY += (mY - cY) * 0.15;
            cursor.style.transform = `translate3d(${cX}px, ${cY}px, 0)`;
            requestAnimationFrame(move);
        }
        move();

        let clicks = 0;
        let storage = [];
        document.getElementById('secretTrigger').addEventListener('click', () => {
            clicks++;
            if(clicks === 3) {
                if(prompt("INPUT MASTER KEY:") === "1234") {
                    document.getElementById('adminPanel').style.display = 'block';
                }
                clicks = 0;
            }
        });

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        function addPost() {
            const t = document.getElementById('postTitle').value;
            const c = document.getElementById('postCat').value;
            const m = document.getElementById('postMsg').value;
            if(!t || !m) return;
            
            storage.unshift({t, c, m});
            
            if(c === 'urgent') {
                playEmergencySiren();
            } else {
                playNormalBeep();
            }
            
            updateFeed();
            document.getElementById('postTitle').value = "";
            document.getElementById('postMsg').value = "";
        }

        function updateFeed() {
            const f = document.getElementById('feed');
            f.innerHTML = storage.map(s => `
                <div class="card ${s.c === 'urgent' ? 'urgent-card' : ''}">
                    <div style="font-size: 0.6rem; color: ${s.c === 'urgent' ? 'var(--urgent)' : 'var(--accent)'}; font-weight: 900; letter-spacing: 3px; margin-bottom: 12px;">// ${s.c}</div>
                    <h3 style="font-weight: 900; margin-bottom: 15px;">${s.t}</h3>
                    <p style="color: #666; font-size: 0.95rem;">${s.m}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
